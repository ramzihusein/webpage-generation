---
# Job Template: Webpage Generation
# Purpose: Takes the AI research output and generates a polished, branded
#           HTML demo webpage, then uploads it to S3 for deployment.
#
# Required AAP Variables (passed from Job 1 via set_stats):
#   customer_name:       "Footlocker"
#   customer_slug:       "footlocker"
#   research_json:       <JSON string from Job 1>
#   openai_api_key:      from AAP credential
#
# Required AAP Variables (set in Job Template):
#   s3_bucket_name:      "aap-demo-pages-ramzidev"
#   aws_region:          "us-east-1"

- name: Webpage generation — build and upload customer demo page
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    openai_model: "granite-3-2-8b-instruct"
    openai_api_url: "https://maas-rhdp.apps.maas.redhatworkshops.io/v1/chat/completions"
    s3_bucket_name: "aap-demo-pages-ramzidev-{{ 99999 | random }}"
    aws_region: "us-east-2"
    page_output_path: "/tmp/{{ customer_slug }}_demo_page.html"

  tasks:
    - name: Verify AWS credentials are working
      amazon.aws.aws_caller_info:
      register: caller_info

    - name: Print caller identity
      ansible.builtin.debug:
        msg: "Account: {{ caller_info.account }} | ARN: {{ caller_info.arn }}"
        
    - name: Parse research JSON from workflow artifact
      ansible.builtin.set_fact:
        company_research: "{{ research_json | from_json }}"

    - name: Build webpage generation prompt
      ansible.builtin.set_fact:
        webpage_prompt: |
          Generate a complete single-file HTML page. Use ONLY the data below.
          Do NOT use any placeholder syntax like {variable} or {{variable}}.
          Write out every value explicitly in the HTML.
          Generate ALL 5 use case cards and ALL 3 customer reference cards in full.
          No comments like "repeat for other items".

          COMPANY: {{ company_research.company_name }}
          INDUSTRY: {{ company_research.industry }}
          EXECUTIVE HOOK: {{ company_research.executive_hook }}
          COMPANY SUMMARY: {{ company_research.company_summary }}
          EMPLOYEE COUNT: {{ company_research.employee_count }}
          ANNUAL REVENUE: {{ company_research.annual_revenue }}
          PRODUCTIVITY GAIN: {{ company_research.business_value_summary.productivity_gain_percent }}%
          MTTR REDUCTION: {{ company_research.business_value_summary.mttr_reduction_percent }}%
          HOURS SAVED: {{ company_research.business_value_summary.estimated_fte_hours_saved_per_year }}
          DEPLOYMENT FREQUENCY INCREASE: {{ company_research.business_value_summary.deployment_frequency_increase_percent }}%
          KEY VALUE STATEMENT: {{ company_research.business_value_summary.key_value_statement }}

          IT CHALLENGES:
          {% for challenge in company_research.it_challenges %}
          - {{ challenge }}
          {% endfor %}

          USE CASES:
          {% for uc in company_research.automation_use_cases %}
          {{ loop.index }}. TITLE: {{ uc.title }}
             DESCRIPTION: {{ uc.description }}
             CATEGORY: {{ uc.category }}
             HOURS SAVED: {{ uc.estimated_hours_saved_per_year }}
             COLLECTIONS: {{ uc.ansible_collections | join(', ') }}
          {% endfor %}

          CUSTOMER REFERENCES:
          {% for ref in company_research.red_hat_customer_references %}
          {{ loop.index }}. COMPANY: {{ ref.company }}
             OUTCOME: {{ ref.outcome }}
             RELEVANCE: {{ ref.relevance }}
          {% endfor %}

          Design requirements:
          - Single self-contained HTML file, all CSS in <style> tag
          - Red Hat colors: primary #EE0000, dark #151515, accent #0066CC
          - Google Fonts Inter via @import
          - Fully responsive
          - Cards with white background, box-shadow, 8px border-radius, 4px left border in Red Hat red
          - Category badge colors: Infrastructure=#0066CC, Security=#3E8635, Network=#F0AB00, Cloud=#8481DD, AppDev=#EC7A08
          - Large bold metrics in Red Hat red
          - Footer: "Prepared by Red Hat | ramzidev.com | Confidential — for discussion purposes only | {{ ansible_date_time.date | default('2026') }}"

          Return ONLY the complete HTML. Start with <!DOCTYPE html> and end with </html>.

    - name: Call OpenAI API for webpage generation
      ansible.builtin.uri:
        url: "{{ openai_api_url }}"
        method: POST
        headers:
          Authorization: "Bearer {{ openai_api_key }}"
          Content-Type: "application/json"
        body_format: json
        body:
          model: "{{ openai_model }}"
          temperature: 0.4
          max_tokens: 4096
          messages:
            - role: "system"
              content: >
                You are an expert web designer. Return only raw HTML. 
                Never use markdown code fences. Never include any text 
                before <!DOCTYPE html> or after </html>.
                Do NOT use any placeholder variables or template syntax of any kind.
                All content must be fully rendered with actual data from the JSON provided.
                Every section must be complete — do not use comments like 'repeat for other items'.
                Generate all 5 use case cards and all 3 customer reference cards in full.
                For the footer date use a hardcoded date string, no JavaScript.
            - role: "user"
              content: "{{ webpage_prompt }}"
        timeout: 90
        status_code: 200
      register: webpage_response

    - name: Extract HTML content
      ansible.builtin.set_fact:
        page_html: "{{ webpage_response.json.choices[0].message.content | trim }}"

    - name: Validate response looks like HTML
      ansible.builtin.assert:
        that:
          - page_html | lower is search('<!doctype html>')
          - page_html | lower is search('</html>')
          - page_html | lower is search('ansible')
        fail_msg: "OpenAI did not return valid HTML. Check the generation prompt."

    - name: Save HTML to local temp file
      ansible.builtin.copy:
        content: "{{ page_html }}"
        dest: "{{ page_output_path }}"
        mode: '0644'

    - name: Create S3 bucket for demo pages (idempotent)
      amazon.aws.s3_bucket:
        name: "{{ s3_bucket_name }}"
        region: "{{ aws_region }}"
        endpoint_url: "https://s3.{{ aws_region }}.amazonaws.com"
        state: present
        public_access:
          block_public_acls: false
          block_public_policy: false
          ignore_public_acls: false
          restrict_public_buckets: false
        tags:
          Project: "aap-demo"
          ManagedBy: "ansible"
      register: s3_bucket_result
      
    - name: Upload HTML page to S3
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "{{ customer_slug }}/index.html"
        src: "{{ page_output_path }}"
        mode: put
        headers:
          Content_Type: "text/html; charset=utf-8"
        region: "{{ aws_region }}"

    - name: Set artifact facts for downstream jobs
      ansible.builtin.set_stats:
        data:
          customer_slug: "{{ customer_slug }}"
          customer_name: "{{ customer_name }}"
          s3_bucket_name: "{{ s3_bucket_name }}"
          s3_page_key: "{{ customer_slug }}/index.html"
          demo_url: "https://{{ customer_slug }}.ramzidev.com"
      delegate_to: localhost

    - name: Print generation summary
      ansible.builtin.debug:
        msg:
          - "Page generated for: {{ customer_name }}"
          - "Uploaded to: s3://{{ s3_bucket_name }}/{{ customer_slug }}/index.html"
          - "Demo URL will be: https://{{ customer_slug }}.ramzidev.com"
