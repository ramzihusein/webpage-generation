---
# Job Template: Webpage Generation
# Purpose: Takes the AI research output and generates a polished, branded
#           HTML demo webpage, then uploads it to S3 for deployment.
#
# Required AAP Variables (passed from Job 1 via set_stats):
#   customer_name:       "Footlocker"
#   customer_slug:       "footlocker"
#   research_json:       <JSON string from Job 1>
#   openai_api_key:      from AAP credential
#
# Required AAP Variables (set in Job Template):
#   s3_bucket_name:      "aap-demo-pages-ramzidev"
#   aws_region:          "us-east-1"

- name: Webpage generation — build and upload customer demo page
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    openai_model: "granite-3-2-8b-instruct"
    openai_api_url: "https://maas-rhdp.apps.maas.redhatworkshops.io/v1/chat/completions"
    s3_bucket_name: "aap-demo-pages-ramzidev-{{ 99999 | random }}"
    aws_region: "us-east-2"
    page_output_path: "/tmp/{{ customer_slug }}_demo_page.html"

  tasks:
    - name: Verify AWS credentials are working
      amazon.aws.aws_caller_info:
      register: caller_info

    - name: Print caller identity
      ansible.builtin.debug:
        msg: "Account: {{ caller_info.account }} | ARN: {{ caller_info.arn }}"
        
    - name: Parse research JSON from workflow artifact
      ansible.builtin.set_fact:
        company_research: "{{ research_json | from_json }}"

    - name: Build webpage generation prompt
      ansible.builtin.set_fact:
        webpage_prompt: "Generate a complete single-file HTML page using ONLY the data provided below. Do NOT use any placeholder syntax like {variable}. Write every value explicitly in the HTML. Generate ALL 5 use case cards and ALL 3 customer reference cards in full. No comments like repeat for other items. Here is the company data as JSON: {{ company_research | to_json }} Design requirements: single self-contained HTML file all CSS in style tag, Red Hat colors primary #EE0000 dark #151515 accent #0066CC, Google Fonts Inter via @import, fully responsive, cards with white background box-shadow 8px border-radius 4px left border in Red Hat red, category colors Infrastructure=#0066CC Security=#3E8635 Network=#F0AB00 Cloud=#8481DD AppDev=#EC7A08, large bold metrics in Red Hat red, footer says Prepared by Red Hat ramzidev.com Confidential for discussion purposes only. The @import for Google Fonts must be the very first line inside the style tag. The footer must NOT use position fixed. You MUST include these sections in order: 1) Red Hat branded header with company name, 2) Executive summary with key metrics row, 3) Top 5 automation use cases as cards, 4) Quantified business value with large metric numbers, 5) Customer references as cards with Read case study link, 6) Technology overview two columns Your Challenges vs How AAP Addresses Them, 7) Footer. The executive summary must include the executive_hook and company_summary as paragraph text before the metrics row. All case study links must use a hash symbol as the href value. Define CSS for .grid-container as display:flex and .column as flex:1 with padding. Apply the correct category class to each use case card matching its category value. Define CSS for .key-metrics as display:flex justify-content:space-around and .metric as text-align:center. The key metric number must use font-size:3rem font-weight:700 color:#EE0000 display:block. The footer must show the current year 2026, not 2023. Return ONLY complete HTML starting with <!DOCTYPE html> and ending with </html>."

    - name: Call OpenAI API for webpage generation
      ansible.builtin.uri:
        url: "{{ openai_api_url }}"
        method: POST
        headers:
          Authorization: "Bearer {{ openai_api_key }}"
          Content-Type: "application/json"
        body_format: json
        body:
          model: "{{ openai_model }}"
          temperature: 0.4
          max_tokens: 4096
          messages:
            - role: "system"
              content: "You are an expert web designer. Return only raw HTML. Never use markdown code fences. Never include any text before <!DOCTYPE html> or after </html>. Do NOT use any placeholder syntax or template variables of any kind. All content must be fully rendered with actual data from the JSON provided. Every section must be complete — do not use comments like repeat for other items. Generate all 5 use case cards and all 3 customer reference cards in full. For the footer date use a hardcoded date string, no JavaScript. You are writing a static HTML file. There is no server, no PHP, no JavaScript templating, no backend. Every piece of text content must be written as literal hardcoded strings directly in the HTML. Never use PHP, template variables, or any server-side syntax."
            - role: "user"
              content: "{{ webpage_prompt }}"
        timeout: 90
        status_code: 200
      register: webpage_response

    - name: Extract HTML content
      ansible.builtin.set_fact:
        page_html: "{{ webpage_response.json.choices[0].message.content | trim }}"

    - name: Validate response looks like HTML
      ansible.builtin.assert:
        that:
          - page_html | lower is search('<!doctype html>')
          - page_html | lower is search('</html>')
          - page_html | lower is search('ansible')
        fail_msg: "OpenAI did not return valid HTML. Check the generation prompt."

    - name: Save HTML to local temp file
      ansible.builtin.copy:
        content: "{{ page_html }}"
        dest: "{{ page_output_path }}"
        mode: '0644'

    - name: Create S3 bucket for demo pages (idempotent)
      amazon.aws.s3_bucket:
        name: "{{ s3_bucket_name }}"
        region: "{{ aws_region }}"
        endpoint_url: "https://s3.{{ aws_region }}.amazonaws.com"
        state: present
        public_access:
          block_public_acls: false
          block_public_policy: false
          ignore_public_acls: false
          restrict_public_buckets: false
        tags:
          Project: "aap-demo"
          ManagedBy: "ansible"
      register: s3_bucket_result
      
    - name: Upload HTML page to S3
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "{{ customer_slug }}/index.html"
        src: "{{ page_output_path }}"
        mode: put
        headers:
          Content_Type: "text/html; charset=utf-8"
        region: "{{ aws_region }}"

    - name: Set artifact facts for downstream jobs
      ansible.builtin.set_stats:
        data:
          customer_slug: "{{ customer_slug }}"
          customer_name: "{{ customer_name }}"
          s3_bucket_name: "{{ s3_bucket_name }}"
          s3_page_key: "{{ customer_slug }}/index.html"
          demo_url: "https://{{ customer_slug }}.ramzidev.com"
      delegate_to: localhost

    - name: Print generation summary
      ansible.builtin.debug:
        msg:
          - "Page generated for: {{ customer_name }}"
          - "Uploaded to: s3://{{ s3_bucket_name }}/{{ customer_slug }}/index.html"
          - "Demo URL will be: https://{{ customer_slug }}.ramzidev.com"
